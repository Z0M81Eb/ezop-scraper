name: Dancing Bear API Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repozitorija
      uses: actions/checkout@v3

    - name: Postavljanje Pythona
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalacija potrebnih biblioteka
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Pokretanje API scrapera
      run: python scraper_dancingbear.py

    - name: Commit i Push promjena
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add dancingbear_ploce.csv
        git commit -m "🤖 Automatsko ažuriranje: Dancing Bear (API Sync)" || echo "Nema novih promjena za spremanje"
        git pull --rebase origin main
        git push
