name: Scrape Karma Vinil

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repozitorija
      uses: actions/checkout@v3

    - name: Postavljanje Pythona
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalacija biblioteka
      run: |
        python -m pip install --upgrade pip
        pip install cloudscraper beautifulsoup4

    - name: Pokretanje scrapera
      run: python scraper_karma.py

    - name: Commit i Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add karma_ploce.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Karma Vinil kataloga" && git push)
