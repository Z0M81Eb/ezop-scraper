name: Scrape Menart

on:
  schedule:
    - cron: '0 4 * * *' # Vrti se automatski svaki dan u 4 ujutro
  workflow_dispatch: # Zadržano za tvoje ručno testiranje na klik

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repozitorija
      uses: actions/checkout@v3

    - name: Postavljanje Pythona
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalacija biblioteka
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Pokretanje scrapera
      run: python scraper_menart.py

    - name: Commit i Push promjena
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add menart_katalog.csv
        # Sigurnosni provjera: commit radi samo ako je GitHub našao stvarne promjene u cijenama/zalihama
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Menart API kataloga" && git push)
