name: Ezop Antikvarijat Scraper

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repozitorija
      uses: actions/checkout@v3

    - name: Postavljanje Pythona
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalacija potrebnih biblioteka
      run: |
        python -m pip install --upgrade pip
        pip install cloudscraper beautifulsoup4

    - name: Pokretanje scrapera
      run: python scraper_ezop.py

    - name: Commit i Push promjena
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add ezop_ploce.csv
        git commit -m "🤖 Automatsko ažuriranje: Ezop (Smart Sync)" || echo "Nema novih promjena za spremanje"
        git pull --rebase origin main
        git push
