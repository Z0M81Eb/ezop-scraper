name: Scrape Ezop

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repozitorija
      uses: actions/checkout@v3

    - name: Postavljanje Pythona
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalacija biblioteka
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Pokretanje scrapera
      run: python scraper_ezop.py

  - name: Commit i Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.csv
        if ! git diff --staged --quiet; then
          git commit -m "Auto-update kataloga"
          git pull --rebase origin main
          git push
        else
          echo "Nema novih promjena za spremanje."
        fi
